name: release

# Tag vX.Y.Z -> build -> publish to PyPI via trusted publishing (OIDC).
# Requires the PyPI project to have Lab2A/metalworks configured as a
# trusted publisher for this workflow file.

on:
  push:
    tags: ["v*"]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v8.2.0
        with:
          python-version: "3.12"
          # This repo doesn't commit uv.lock; key the cache off pyproject.toml
          # so it actually invalidates (default **/uv.lock glob never matches).
          cache-dependency-glob: "pyproject.toml"
      - run: uv build
      - uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1
