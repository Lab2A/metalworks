name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: test (py${{ matrix.python }}, ${{ matrix.extras }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python: ["3.11", "3.12", "3.13"]
        extras: ["bare", "all"]
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v8.2.0
        with:
          python-version: ${{ matrix.python }}
          # This repo doesn't commit uv.lock; key the cache off pyproject.toml
          # so it actually invalidates (default **/uv.lock glob never matches).
          cache-dependency-glob: "pyproject.toml"
      - run: uv venv --clear
      - name: Install (bare)
        if: matrix.extras == 'bare'
        run: uv pip install -e ".[dev]"
      - name: Install (all extras)
        if: matrix.extras == 'all'
        run: uv pip install -e ".[all,dev]"
      # Offline by default: pytest-socket blocks all network in CI tests.
      - name: Test
        run: uv run pytest -q
      - name: Console script smoke
        run: uv run metalworks version

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v8.2.0
        with:
          python-version: "3.12"
          # This repo doesn't commit uv.lock; key the cache off pyproject.toml
          # so it actually invalidates (default **/uv.lock glob never matches).
          cache-dependency-glob: "pyproject.toml"
      - run: uv venv --clear
      # All extras so pyright resolves real provider SDK imports (crypto,
      # supabase, etc.). Adapters keep SDK objects behind Any regardless, but
      # the few real `from x import y` lines need x present to typecheck.
      - run: uv pip install -e ".[all,dev]"
      - run: uv run ruff check .
      - run: uv run ruff format --check .
      - run: uv run pyright
      # Generated-catalog drift gate: docs/sources.md must match what the
      # generator emits from each connector's SourceSpec (mirrors the
      # gen_ts_types --check pattern). Fails CI if a spec changed without a regen.
      - run: uv run python scripts/gen_sources_md.py --check
